version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - dev-net
    

  dev:
    image: mcr.microsoft.com/devcontainers/python:3.12
    command: sleep infinity
    volumes:
      - .:/workspace:cached 
    networks:
      - dev-net
    depends_on:
      - ollama

networks:
  dev-net:
    driver: bridge

volumes:
  ollama_data:
    external: true
    name: ollama-shared-data